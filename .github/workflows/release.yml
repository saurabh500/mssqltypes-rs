name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Publish & Tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed to push back to main
          # Uses RELEASE_TOKEN (a PAT) to bypass branch protection rules
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Pre-flight checks ──────────────────────────────────────────
      - name: Lint & test
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test --all-features

      # ── Read current version ────────────────────────────────────────
      - name: Read current version
        id: current
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      # ── Publish to crates.io ────────────────────────────────────────
      - name: Publish to crates.io
        if: ${{ inputs.dry_run == false }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Publish dry run
        if: ${{ inputs.dry_run == true }}
        run: cargo publish --dry-run --allow-dirty

      # ── Tag the release ─────────────────────────────────────────────
      - name: Create and push Git tag
        if: ${{ inputs.dry_run == false }}
        run: |
          TAG="v${{ steps.current.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Tagged: $TAG"

      # ── Create GitHub Release ───────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${{ steps.current.outputs.version }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: `Published to [crates.io](https://crates.io/crates/mssqltypes/${tag.slice(1)})`,
              draft: false,
              prerelease: false,
            });

      # ── Summary ─────────────────────────────────────────────────────
      - name: Job summary
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          DRY="${{ inputs.dry_run }}"
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$DRY" = "true" ]; then
            echo "🧪 **Dry run** — no changes were published or pushed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ **Published** \`mssqltypes@${CURRENT}\` to crates.io" >> "$GITHUB_STEP_SUMMARY"
            echo "🏷️ **Tagged** \`v${CURRENT}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
